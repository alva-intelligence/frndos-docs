name: Ingest Help Center to AskFrnd

# Re-index Help Center content into the AskFrnd knowledge base (frnd-ai-services)
# whenever docs change on the tracked branch. Ingestion is incremental + idempotent
# (the service skips unchanged docs by content hash), so re-running is cheap and safe.
#
# Two environments, two transports:
#   - staging    → HTTP POST to the public domain (nginx allows it).
#   - Production → SSH into the server and curl 127.0.0.1:8484 directly, BYPASSING
#                  nginx. Production's nginx has an IP allowlist that denies the
#                  GitHub-hosted runner (returns an nginx 403 before reaching the
#                  app). Hitting uvicorn on localhost sidesteps the allowlist
#                  entirely — same pattern as frnd-ai-services' deploy.yml.
#
# Required secrets:
#   staging environment:
#     AI_SERVICE_URL            base URL of frnd-ai-services (e.g. https://ai-staging.frndos.com)
#     HELP_CENTER_INGEST_TOKEN  shared secret sent as X-Internal-Token
#   Production environment (SSH — mirror of frnd-ai-services deploy.yml):
#     HOST, USERNAME, PRIVATE_KEY, PORT (optional, default 22), SERVER_PATH
#     (the X-Internal-Token is read from the server's own .env — not stored here)

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
  workflow_dispatch:
    inputs:
      mode:
        description: "Ingest mode"
        type: choice
        default: incremental
        options:
          - incremental
          - full

concurrency:
  group: help-center-ingest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ingest-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Trigger ingest (HTTP, public domain)
        env:
          AI_SERVICE_URL: ${{ secrets.AI_SERVICE_URL }}
          INGEST_TOKEN: ${{ secrets.HELP_CENTER_INGEST_TOKEN }}
          MODE: ${{ github.event.inputs.mode || 'incremental' }}
        run: |
          set -euo pipefail
          if [ -z "${AI_SERVICE_URL:-}" ] || [ -z "${INGEST_TOKEN:-}" ]; then
            echo "::error::Missing AI_SERVICE_URL or HELP_CENTER_INGEST_TOKEN secret"
            exit 1
          fi
          echo "Ingesting Help Center (mode=${MODE}) → ${AI_SERVICE_URL%/}/api/help-center/ingest"
          http_code=$(curl --silent --show-error \
            --retry 3 --retry-delay 5 --retry-all-errors \
            --max-time 300 \
            -o response.json -w "%{http_code}" \
            -X POST "${AI_SERVICE_URL%/}/api/help-center/ingest" \
            -H "Content-Type: application/json" \
            -H "X-Internal-Token: ${INGEST_TOKEN}" \
            -d "{\"mode\":\"${MODE}\"}")
          echo "HTTP ${http_code}"
          cat response.json || true
          echo ""
          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            echo "::error::Ingest failed (HTTP ${http_code})"
            exit 1
          fi

  ingest-production:
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Trigger ingest (SSH → localhost:8484, bypass nginx)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262  # v1.0.3
        env:
          MODE: ${{ github.event.inputs.mode || 'incremental' }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT || 22 }}
          envs: MODE
          script: |
            set -euo pipefail

            cd "${{ secrets.SERVER_PATH }}"
            if [ ! -f .env ]; then
              echo "::error::.env not found in ${{ secrets.SERVER_PATH }}"
              exit 1
            fi

            # Read the ingest token straight from the server's .env — single
            # source of truth, no need to duplicate it into GitHub Secrets.
            TOKEN=$(grep -E '^HELP_CENTER_INGEST_TOKEN=' .env | head -n1 | cut -d= -f2- | tr -d '\r"' | xargs)
            if [ -z "${TOKEN:-}" ]; then
              echo "::error::HELP_CENTER_INGEST_TOKEN not set in server .env"
              exit 1
            fi

            echo "Ingesting Help Center (mode=${MODE}) → http://127.0.0.1:8484/api/help-center/ingest"
            http_code=$(curl --silent --show-error \
              --retry 3 --retry-delay 5 --retry-all-errors \
              --max-time 300 \
              -o /tmp/ingest-response.json -w "%{http_code}" \
              -X POST "http://127.0.0.1:8484/api/help-center/ingest" \
              -H "Content-Type: application/json" \
              -H "X-Internal-Token: ${TOKEN}" \
              -d "{\"mode\":\"${MODE}\"}")
            echo "HTTP ${http_code}"
            cat /tmp/ingest-response.json || true
            echo ""
            rm -f /tmp/ingest-response.json
            if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
              echo "::error::Ingest failed (HTTP ${http_code})"
              exit 1
            fi
